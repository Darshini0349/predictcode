<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 2 - LifeGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='/'">
            <div class="nav-logo">🏥</div>
            <span class="nav-title">LifeGuard AI</span>
        </div>
        <button class="dark-toggle" onclick="toggleDark()">☀️ Light Mode</button>
    </nav>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Analyzing your health data...</div>
    </div>

    <!-- FORM PAGE -->
    <div class="form-page">
        <div class="form-container">

            <!-- Header -->
            <div class="form-header">
                <span class="section-eyebrow">Stage 2</span>
                <h1>Advanced Health Assessment</h1>
                <p>Enter your lifestyle details and medical values for a more accurate prediction</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrap">
                <div class="progress-info">
                    <span id="stepCounter">Step 1 of 6</span>
                    <span id="progressPercent">17%</span>
                </div>
                <div class="progress-track">
                    <div id="progressFill" style="width:17%"></div>
                </div>
                <div class="progress-dots">
                    <div class="progress-dot progress-dot--active" data-step="1"></div>
                    <div class="progress-dot" data-step="2"></div>
                    <div class="progress-dot" data-step="3"></div>
                    <div class="progress-dot" data-step="4"></div>
                    <div class="progress-dot" data-step="5"></div>
                    <div class="progress-dot" data-step="6"></div>
                </div>
            </div>

            <!-- FORM -->
            <form id="multiStepForm" data-stage="2">

                <!-- STEP 1: Personal Info -->
                <div class="form-step form-step--active">
                    <div class="form-card">
                        <h2>Personal Information</h2>
                        <p class="form-card-subtitle">Tell us a little about yourself</p>

                        <div class="form-group">
                            <label class="form-label">Gender</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="gender" value="male" required>
                                    <span class="option-card-icon">👨</span>
                                    <span class="option-card-label">Male</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="gender" value="female" required>
                                    <span class="option-card-icon">👩</span>
                                    <span class="option-card-label">Female</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="age">Age</label>
                            <input type="number" id="age" name="age" class="form-input" placeholder="Enter your age"
                                min="10" max="100" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Height & Weight (for BMI)</label>
                            <div class="bmi-row">
                                <input type="number" id="height" name="height" class="form-input"
                                    placeholder="Height (cm)" min="100" max="250">
                                <input type="number" id="weight" name="weight" class="form-input"
                                    placeholder="Weight (kg)" min="20" max="300">
                            </div>
                            <div id="bmiCategory" class="bmi-result"></div>
                            <input type="hidden" id="bmi" name="bmi">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Family History of Diabetes / Heart / BP?</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="family_history" value="true" required>
                                    <span class="option-card-icon">✅</span>
                                    <span class="option-card-label">Yes</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="family_history" value="false" required>
                                    <span class="option-card-icon">❌</span>
                                    <span class="option-card-label">No</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: Lifestyle -->
                <div class="form-step">
                    <div class="form-card">
                        <h2>Lifestyle Habits</h2>
                        <p class="form-card-subtitle">Tell us about your daily habits</p>

                        <div class="form-group">
                            <label class="form-label">Smoking Status</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="smoking" value="none" required>
                                    <span class="option-card-icon">🚭</span>
                                    <span class="option-card-label">Non-Smoker</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="smoking" value="occasional">
                                    <span class="option-card-icon">🌬️</span>
                                    <span class="option-card-label">Occasional</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="smoking" value="regular">
                                    <span class="option-card-icon">🚬</span>
                                    <span class="option-card-label">Regular</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Alcohol Consumption</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="alcohol" value="none" required>
                                    <span class="option-card-icon">🚫</span>
                                    <span class="option-card-label">Non-Drinker</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="alcohol" value="occasional">
                                    <span class="option-card-icon">🍷</span>
                                    <span class="option-card-label">Occasional</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="alcohol" value="regular">
                                    <span class="option-card-icon">🍺</span>
                                    <span class="option-card-label">Regular</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Physical Activity</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="exercise" value="regular" required>
                                    <span class="option-card-icon">🏃</span>
                                    <span class="option-card-label">Regular</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="exercise" value="occasional">
                                    <span class="option-card-icon">🚶</span>
                                    <span class="option-card-label">Occasional</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="exercise" value="none">
                                    <span class="option-card-icon">🛋️</span>
                                    <span class="option-card-label">No Exercise</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Sleep Duration</label>
                            <div class="option-cards">
                                <label class="option-card">
                                    <input type="radio" name="sleep" value="7-8" required>
                                    <span class="option-card-icon">😴</span>
                                    <span class="option-card-label">7-8 hrs</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="sleep" value="5-6">
                                    <span class="option-card-icon">😪</span>
                                    <span class="option-card-label">5-6 hrs</span>
                                </label>
                                <label class="option-card">
                                    <input type="radio" name="sleep" value="less_than_5">
                                    <span class="option-card-icon">😩</span>
                                    <footer class="footer">
                                        <p>⚠️ This tool is for awareness only and is <strong>not a medical
                                                diagnosis</strong>.</p>
                                    </footer>

                                    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
                                    <script src="{{ url_for('static', filename='js/form.js') }}"></script>

</body>

</html>
